<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DarkX-Ultra Bot Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #111, #000);
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .panel {
      background: #0f0f0f;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 30px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,255,255,0.15);
    }

    .panel h1 {
      color: #00ffff;
      margin-bottom: 10px;
    }

    .panel p {
      color: #ccc;
      font-size: 15px;
      margin-bottom: 25px;
    }

    .price {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .pay {
      background: #00c853;
      color: #000;
    }

    .continue {
      background: #ffab00;
      color: #000;
    }

    .go {
      background: #00ffff;
      color: #000;
    }

    .btn:hover {
      opacity: 0.9;
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>

<body>

  <div class="panel">
    <h1>DarkX-Ultra</h1>
    <p>Bot Deployment Panel</p>

    <div class="price">
      🔐 You must pay <b>3,000 TSH</b> or <b>1 USD</b><br>
      to deploy DarkX-Ultra Bot
    </div>

    <!-- Payment Button -->
    <button class="btn pay"
      onclick="window.open('https://wa.me/255775710774?text=Request%20payment%20for%20DarkX-Ultra%20bot%20deployment','_blank')">
      💳 Pay Now
    </button>

    <!-- Continue Button -->
    <button class="btn continue"
      onclick="alert('After payment, click GO to continue')">
      ➡ Continue
    </button>

    <!-- Go Button -->
    <button class="btn go"
      onclick="window.location.href='Resources/Web/main.html'">
      🚀 GO
    </button>

    <footer>
      © DarkX-Ultra | Secure Bot Panel
    </footer>
  </div>

</body>
</html>
